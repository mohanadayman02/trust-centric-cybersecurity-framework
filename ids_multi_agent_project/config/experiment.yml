experiment:
  name: louati_ktata_multi_agent_baseline
  random_state: 42

run_mode: feature_view_multi_agent
dataset: NSL-KDD
classification: binary
num_agents: 4
expanded_models_enabled: false
four_agent_mode:
  balance_agents: true
  max_general_agent_features: null
  target_agent_accuracy_range:
    min: 0.92
    max: 0.97
feature_views:
  enabled: true
  views:
    - basic
    - content
    - time_traffic
    - host_traffic
use_autoencoder: false
use_trust_layer: false
use_attention: false
decision_strategy: majority_vote
cross_validation: false

baseline:
  dataset: NSL-KDD
  use_autoencoder: true
  agents: [mlp, knn]
  decision_strategy: knn_tiebreak
  use_trust_layer: false
  cross_validation: false

datasets:
  - name: NSL-KDD
    path: data/nsl_kdd.csv
    label_column: label
    categorical_columns: [protocol_type, service, flag]
  - name: UNSW-NB15
    train_path: data/raw/unsw_nb15/UNSW_NB15_training-set.csv
    test_path: data/raw/unsw_nb15/UNSW_NB15_testing-set.csv
    label_column: label
    categorical_columns: [proto, service, state]
  - name: ToN-IoT
    combine_csvs: false
  - name: CICIDS2017
    stratified_subsample: true
    max_train_samples: 100000
    max_validation_samples: 25000
    max_test_samples: 50000

models:
  autoencoder:
    encoding_dim: 32
    activation: tanh
    alpha: 0.001
    learning_rate_init: 0.0003
    max_iter: 120
    early_stopping: true
    random_state: 42
  mlp:
    hidden_layer_sizes: [64, 32]
    activation: tanh
    alpha: 0.001
    learning_rate_init: 0.0003
    early_stopping: true
    max_iter: 300
    random_state: 42
  knn:
    n_neighbors: 5
    weights: distance

preprocessing:
  binary_classification: true
  normal_label_values: ["normal", "Normal", 0]
  scale_numeric_features: true
  encode_categorical_features: true
  handle_missing_values: true
  test_size: 0.3

validation:
  cross_validation_folds: 5

metrics:
  - accuracy
  - precision
  - recall
  - f1

trust_methods:
  enabled:
    - majority_voting
    - accuracy_based_trust
    - attack_recall_trust
    - role_aware_trust_voting
    - trust_agent_selector
  error_aware:
    alpha: 0.3
    beta: 0.7
  attack_recall:
    w_recall: 0.40
    w_low_fnr: 0.30
    w_f1: 0.20
    w_precision: 0.10
  role_aware_trust_voting:
    attack_threshold: 0.60
    normal_threshold: 0.65
  trust_agent_selector:
    neighbor_k: 25
    disagreement_bonus: 0.10
    attack_role_bonus: 0.08
    normal_role_bonus: 0.08
    attack_confidence_threshold: 0.60
    normal_confidence_threshold: 0.65

agentic_reasoning:
  ollama_enabled: false
  ollama_model_name: llama3.1:8b
  ollama_base_url: http://localhost:11434
  ollama_timeout_seconds: 15
  max_reasoning_samples_per_dataset: 50
  enable_agent_reasoning_output: false
  reasoning_scope: disagreement_only
